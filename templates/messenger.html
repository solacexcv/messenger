<!DOCTYPE html>
<html>
<head>
    <title>Messenger Group Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: auto;
            padding: 10px;
        }

        #nameBox {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }

        #chatBox {
            display: none;
        }

        #messages {
            background: white;
            padding: 10px;
            border-radius: 10px;
            height: 65vh;
            overflow-y: auto;
        }

        .message {
            background: #e4e6eb;
            padding: 8px;
            margin: 6px 0;
            border-radius: 10px;
        }

        #inputBox {
            margin-top: 10px;
            display: flex;
        }

        #messageInput {
            flex: 1;
            padding: 10px;
        }

        button {
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Name Input -->
    <div id="nameBox">
        <h2>Enter Your Name</h2>
        <input type="text" id="nameInput" placeholder="Your name">
        <button onclick="saveName()">Enter Chat</button>
    </div>

    <!-- Chat Box -->
    <div id="chatBox">
        <h2>Group Chat</h2>
        <div id="messages"></div>

        <div id="inputBox">
            <input type="text" id="messageInput" placeholder="Type message">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

</div>

<script>
    function saveName() {
        const name = document.getElementById("nameInput").value;

        if (name) {
            localStorage.setItem("chatName", name);
            document.getElementById("nameBox").style.display = "none";
            document.getElementById("chatBox").style.display = "block";
            loadMessages();
        }
    }

    function getName() {
        return localStorage.getItem("chatName");
    }

    async function loadMessages() {
        const response = await fetch('/get_messages');
        const messages = await response.json();

        const box = document.getElementById('messages');
        box.innerHTML = "";

        messages.forEach(msg => {
            const div = document.createElement("div");
            div.className = "message";
            div.textContent = msg;
            box.appendChild(div);
        });
    }

    async function sendMessage() {
        const text = document.getElementById('messageInput').value;
        const name = getName();

        if (!text) return;

        await fetch('/add_message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name, message: text })
        });

        document.getElementById('messageInput').value = '';
    }

    setInterval(loadMessages, 3000);

    if (getName()) {
        document.getElementById("nameBox").style.display = "none";
        document.getElementById("chatBox").style.display = "block";
        loadMessages();
    }
</script>

</body>
</html>
